<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Nativize terms</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://nativize.dev/terms/" />

</head>

</body>
</html>
